# .github/workflows/docs.yml
name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "mkdocs.yml"
      - "cmd/**"
      - "internal/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make gendocs
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install --break-system-packages mkdocs-materialx
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - uses: actions/deploy-pages@v5
        id: deployment
