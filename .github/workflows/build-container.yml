name: Build ubuntu-intune container image
on:
  pull_request:
    branches:
      - main
    paths:
      - "ubuntu-intune/**"
  schedule:
    - cron: "0 10 * * *"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "ubuntu-intune/**"
  workflow_dispatch:

env:
  IMAGE_DESC: "Intune Container"
  IMAGE_KEYWORDS: "ubuntu,intune"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/234627017?s=200&v=4"
  IMAGE_NAME: "ubuntu-intune"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

permissions: {}

jobs:
  matrix:
    name: Compute build matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - id: set
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo 'include=[{"channel":"","tag":"latest"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'include=[{"channel":"","tag":"latest"},{"channel":"insiders","tag":"insiders"}]' >> "$GITHUB_OUTPUT"
          fi

  build_push:
    name: Build and push image (${{ matrix.tag }})
    needs: matrix
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ matrix.tag }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}

    permissions:
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}
          echo "DEFAULT_TAG=${{ matrix.tag }}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Checkout latest stable tag on schedule
        if: github.event_name == 'schedule'
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l --sort=-v:refname | head -n 1)
          git checkout "$LATEST_TAG"
          echo "CHECKED_OUT_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Build hash
        run: |
          # Grab commit hash
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> ${GITHUB_ENV}

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }},enable=${{ github.event_name != 'schedule' }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}},enable=${{ github.event_name != 'schedule' }}
            type=raw,value=${{ env.CHECKED_OUT_TAG }},enable=${{ github.event_name == 'schedule' && matrix.tag == 'latest' }}
            type=raw,value=${{ env.CHECKED_OUT_TAG }}-{{date 'YYYYMMDD'}},enable=${{ github.event_name == 'schedule' && matrix.tag == 'latest' }}
            type=raw,value=${{ matrix.tag }}-${{ env.CHECKED_OUT_TAG }},enable=${{ github.event_name == 'schedule' && matrix.tag != 'latest' }}
            type=raw,value=${{ matrix.tag }}-${{ env.CHECKED_OUT_TAG }}-{{date 'YYYYMMDD'}},enable=${{ github.event_name == 'schedule' && matrix.tag != 'latest' }}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/ubuntu-intune/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/ubuntu-intune/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/ubuntu-intune/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.CHECKED_OUT_TAG || env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=MIT
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
          sep-tags: " "
          sep-annotations: " "

      - name: Compute SOURCE_DATE_EPOCH
        id: epoch
        run: echo "epoch=$(date -d '${{ github.event.head_commit.timestamp }}' +%s)" >> $GITHUB_OUTPUT

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./ubuntu-intune/Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          oci: true
          extra-args: --skip-unused-stages=false
          build-args: |
            SOURCE_DATE_EPOCH=${{ steps.epoch.outputs.epoch }}
            CHANNEL=${{ matrix.channel }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        id: push
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}
          extra-args: |
            --compression-format=zstd:chunked

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: "v2.6.1"
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))

      - name: Sign container image
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          for tag in ${{ steps.metadata.outputs.tags }}; do
            cosign sign -y --key env://COSIGN_PRIVATE_KEY --new-bundle-format=false $IMAGE_FULL:$tag
          done
        env:
          TAGS: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      - name: Setup Syft
        id: setup-syft
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.39.0

      - name: Generate SBOM
        id: generate-sbom
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
          SYFT_CMD: ${{ steps.setup-syft.outputs.cmd }}
          OCI_DIR: "/tmp/image-oci-dir"
        run: |
          mkdir -p ${OCI_DIR}/rootfs
          podman container create --replace --name "${IMAGE_NAME}" \
            "localhost/${IMAGE_NAME}:${DEFAULT_TAG}"
          podman export "${IMAGE_NAME}" | sudo tar -C ${OCI_DIR}/rootfs -xf -
          podman container rm "${IMAGE_NAME}"
          SBOM="$(mktemp -d)/sbom.json"
          export SYFT_PARALLELISM=$(($(nproc)*2))
          sudo $SYFT_CMD --source-name "${IMAGE_NAME}" \
            ${OCI_DIR} -o syft-json=${SBOM}
          echo "SBOM=${SBOM}" >> $GITHUB_OUTPUT
          sudo rm -rf ${OCI_DIR}

      - name: Install oras
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Upload SBOM
        id: upload-sbom
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        env:
          IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.push.outputs.digest }}
          SBOM: ${{ steps.generate-sbom.outputs.SBOM }}
        run: |
          cd "$(dirname "${SBOM}")"
          oras attach --artifact-type application/vnd.spdx+json \
            --annotation filename=$(basename "$SBOM") \
            "${IMAGE}@${DIGEST}" "$(basename ${SBOM})"
          sbom_digest=$(oras discover --format json "${IMAGE}@${DIGEST}" | \
            jq -r '.referrers[] | select(.artifactType == \
            "application/vnd.spdx+json") | .digest')
          echo "sbom_digest=${sbom_digest}" >> $GITHUB_OUTPUT

      - name: Sign SBOM OCI Artifact
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.upload-sbom.outputs.sbom_digest }}

      - name: Attestation
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
